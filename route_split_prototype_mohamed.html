const COLORS = ["#e74c3c","#2980b9","#27ae60","#f39c12","#8e44ad","#16a085"];

const map = L.map('map').setView([21.53, 39.16], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = [];
let mode = 'after';

function render() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const key = mode === 'after' ? 'after' : 'before';
  const totals = mode === 'after' ? DATA.after_totals : DATA.before_totals;
  const counts = mode === 'after' ? DATA.after_counts : DATA.before_counts;
  const names = mode === 'after' ? DATA.after_labels : DATA.before_labels;

  DATA.records.forEach(r => {
    const c = r[key];
    const marker = L.circleMarker([r.lat, r.lon], {
      radius: 6,
      fillColor: COLORS[c],
      color: '#fff',
      weight: 1.5,
      fillOpacity: 0.9
    }).bindPopup(
      `<b>${r.name}</b> (${r.code})<br>القناة: ${r.channel}<br>مبيعات: ${r.sales.toLocaleString('en-US')} ريال<br>اليوم المقترح: ${names[c]}`
    );
    marker.addTo(map);
    markers.push(marker);
  });

  const target = DATA.target;
  document.getElementById('targetVal').textContent = Math.round(target).toLocaleString('en-US') + ' ريال';

  let rows = '';
  let maxDevPct = 0;
  for (let i = 0; i < names.length; i++) {
    const total = totals[i];
    const devPct = ((total - target) / target * 100);
    maxDevPct = Math.max(maxDevPct, Math.abs(devPct));
    const devClass = Math.abs(devPct) <= 12 ? 'dev-ok' : 'dev-bad';
    rows += `<tr>
      <td><span class="swatch" style="background:${COLORS[i]}"></span>${names[i]}</td>
      <td>${counts[i]}</td>
      <td>${Math.round(total).toLocaleString('en-US')}</td>
      <td class="${devClass}">${devPct >= 0 ? '+' : ''}${devPct.toFixed(1)}%</td>
    </tr>`;
  }
  document.getElementById('tblBody').innerHTML = rows;

  document.getElementById('summaryText').innerHTML = mode === 'after'
    ? `أقصى انحراف عن المتوسط: <b>${maxDevPct.toFixed(1)}%</b>. توازن ممتاز بين الأيام الستة عن طريق نمو تدريجي من نفس كتل "قبل" الجغرافية — كل عميل انضم لأقرب يوم جاره بس، بدون أي قفزة لعميل بعيد.`
    : `أقصى انحراف عن المتوسط: <b>${maxDevPct.toFixed(1)}%</b>. التجميع الجغرافي البحت وحده بيدي فجوة كبيرة (من 29 ألف لـ 228 ألف ريال بين الأيام).`;
}

document.getElementById('btnBefore').onclick = () => {
  mode = 'before';
  document.getElementById('btnBefore').classList.add('active');
  document.getElementById('btnAfter').classList.remove('active');
  render();
};
document.getElementById('btnAfter').onclick = () => {
  mode = 'after';
  document.getElementById('btnAfter').classList.add('active');
  document.getElementById('btnBefore').classList.remove('active');
  render();
};

render();
</script>
