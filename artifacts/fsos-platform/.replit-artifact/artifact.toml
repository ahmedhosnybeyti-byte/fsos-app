kind = "web"
previewPath = "/"
title = "FSOS Platform"
version = "1.0.0"
id = "artifacts/fsos-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23223

[services.development]
run = "pnpm --filter @workspace/fsos-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fsos-platform", "run", "build" ]
publicDir = "artifacts/fsos-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23223"
BASE_PATH = "/"
