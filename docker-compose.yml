name: field-sales-os

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fieldsalesos
      POSTGRES_PASSWORD: fieldsalesos
      POSTGRES_DB: field_sales_os
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldsalesos -d field_sales_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fieldsalesos
      MINIO_ROOT_PASSWORD: fieldsalesos123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - ./.docker-data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: creates the "field-sales-os" bucket on first boot so the
  # API's StorageProvider (S3Adapter pointed at MinIO in dev) has somewhere
  # to write to without any manual setup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 fieldsalesos fieldsalesos123 &&
      mc mb -p local/field-sales-os || true &&
      mc anonymous set download local/field-sales-os
      "
